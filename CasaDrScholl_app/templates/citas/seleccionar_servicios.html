{% extends 'base.html' %}
{% load static %}
{% block title %}Seleccionar Servicios{% endblock %}

{% block content %}

<div class="container mt-5">
    <h2 class="text-center mb-4">Selecciona los servicios para tu cita</h2>

    <form method="post">
        {% csrf_token %}

        <div class="row">
            {% for checkbox in form.servicios %}
                <div class="col-md-4 mb-3">
                    <label class="card p-3 servicio-card text-center">
                        <div>
                            {{ checkbox.tag }}
                        </div>
                        <h5 class="mt-2">{{ checkbox.choice_label }}</h5>
                    </label>
                </div>
            {% endfor %}
        </div>

        <div class="text-center mt-4">
            <button type="submit" class="btn btn-primary px-5 py-2">
                Continuar
            </button>
        </div>
    </form>
</div>

{% endblock %}s
